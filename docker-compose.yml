# Podman: `podman compose up -d --build` (same file format as Docker Compose)
# SNAPPI_BASE_IMAGE: optional; must be ASCII (real registry/path:tag), e.g.
#   SNAPPI_BASE_IMAGE=docker.m.daocloud.io/library/node:20-alpine
services:
  snappi:
    build:
      context: .
      args:
        BASE_IMAGE: ${SNAPPI_BASE_IMAGE:-node:20-alpine}
    ports:
      - "${SNAPPI_HOST_PORT:-3000}:3000"
    environment:
      # Optional: higher GitHub API limits and private repo access
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Optional: load this issue on startup (you can also paste in the UI)
      ISSUE_URL: ${ISSUE_URL:-}
